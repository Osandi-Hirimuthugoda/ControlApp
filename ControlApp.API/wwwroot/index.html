<!DOCTYPE html>
<html lang="en" ng-app="controlApp">

<head>
    <base href="/">
       <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Control Management</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@7.0.14/dist/browser/signalr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/styles.css?v=14" rel="stylesheet">
</head>

<body ng-controller="MainController as main">

    <!--Header Component -->
    <app-navbar></app-navbar>

    <div class="container-fluid" style="padding: 0 15px;">
        <!-- ng-view will render the routed templates -->
        <div ng-view></div>
    </div>

    <!-- Toast Notifications Container -->
    <div ng-controller="ToastController as toast" ng-if="toast.message" class="position-fixed top-0 end-0 p-3"
        style="z-index: 9999">
        <div class="toast show text-white"
            ng-class="{'bg-success': toast.type==='success', 'bg-danger': toast.type==='error', 'bg-info': toast.type==='info', 'bg-warning': toast.type==='warning'}">
            <div class="d-flex">
                <div class="toast-body">{{toast.message}}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" ng-click="toast.clear()"></button>
            </div>
        </div>
    </div>

    <!-- JS files Loading -->
    <script src="/app.module.js?v=9"></script>
    <script src="/services/notification.service.js?v=9"></script>
    <script src="/services/auth.service.js?v=15"></script>
    <script src="/services/api.service.js?v=12"></script>
    <script src="/services/signalr.service.js?v=3"></script>
    <script src="/components/navbar.component.js?v=10"></script>
    <script src="/components/login.component.js"></script>
    <script src="/components/dashboard.component.js?v=36"></script>
    <script src="/components/controls-sidebar.component.js"></script>
    <script src="/components/controls-view.component.js?v=2"></script>
    <script src="/components/control-board.component.js?v=30"></script>
    <script src="/components/qa-defects.component.js?v=49"></script>
    <script src="/components/test-cases-grid.component.js?v=35"></script>
    <script src="/components/qa-progress.component.js"></script>
    <script src="/components/qa-progress-view.component.js"></script>
    <script src="/components/qa-test-cases.component.js?v=11"></script>
    <script src="/components/developer-progress.component.js"></script>
    <script src="/components/developer-progress-view.component.js"></script>
    <script src="/components/add-control-type.component.js"></script>
    <script src="/components/control-types-list.component.js?v=5"></script>
    <script src="/components/control-types-management.component.js"></script>
    <script src="/components/sub-objectives-view.component.js"></script>
    <script src="/components/sub-objectives-qa.component.js"></script>
    <script src="/components/new-employee.component.js"></script>
    <script src="/components/employees-list.component.js"></script>
    <script src="/components/profile.component.js"></script>
    <script src="/components/team-management.component.js?v=4"></script>
    <script src="/components/rc-matrix.component.js?v=14"></script>
    <script src="/components/super-admin-dashboard.component.js?v=16"></script>
    <script src="/components/access-denied.component.js"></script>

</body>

</html>
